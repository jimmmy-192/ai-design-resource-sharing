<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设计资源精选</title>
    <link rel="stylesheet" href="./styles.css?v=17" />
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="issueLabel">2026-W29 / 7.8-7.15</p>
          <h1 id="pageTitle">本期精选</h1>
        </div>
        <label class="issue-select is-hidden" id="issueSelectWrap">
          <span class="sr-only">选择期次</span>
          <select id="issueSelect">
            <option value="2026-W29">第一期（7.8-7.15）</option>
          </select>
        </label>
      </header>

      <section class="stage" aria-label="资源案例">
        <div class="carousel" id="carousel"></div>
      </section>

      <nav class="mode-tabs" aria-label="页面切换">
        <button class="tab-button is-active" type="button" data-mode="featured">本期精选</button>
        <button class="tab-button" type="button" data-mode="all">所有案例</button>
      </nav>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="./app.js?v=4"></script>
  </body>
</html>
